<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Pedidos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        
        <header class="header-mobile">
            <div class="header-logo-title">
                <img src="logo.jpg" alt="Logo Rof" class="logo-dash" onerror="this.style.display='none'">
                <h1>Orçamentos</h1>
            </div>
            <div class="header-botoes">
                <a href="dashboard.html" class="btn-voltar">Novo Pedido</a>
                <button id="logout-btn" class="btn-danger">Sair</button>
            </div>
        </header>

        <!-- CAIXA DE FILTROS E PESQUISA -->
        <div class="section-box">
            <h3 style="margin-bottom: 15px;">🔍 Pesquisar Pedidos</h3>
            <div class="grid-3">
                <div>
                    <label>Por Nome do Cliente:</label>
                    <input type="text" id="filtro-nome" placeholder="Ex: João Silva...">
                </div>
                <div>
                    <label>Por Nº do Pedido:</label>
                    <input type="text" id="filtro-pedido" placeholder="Ex: 01/2026">
                </div>
                <div>
                    <label>Por Data do Pedido:</label>
                    <input type="date" id="filtro-data">
                </div>
            </div>
            <button type="button" id="btn-limpar" class="btn-danger" style="margin-top: 15px; width: auto; padding: 8px 16px;">Limpar Filtros</button>
        </div>

        <div class="section-box table-container">
            <table id="tabela-historico">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Representante</th>
                        <th>Data</th>
                        <th>Valor Total</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="historico-body">
                    <!-- Preenchido pelo JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let todosPedidos = [];

        const inputNome = document.getElementById('filtro-nome');
        const inputPedido = document.getElementById('filtro-pedido');
        const inputData = document.getElementById('filtro-data');
        const btnLimpar = document.getElementById('btn-limpar');
        const tbody = document.getElementById('historico-body');

        async function carregarHistorico() {
            try {
                const response = await fetch('/api/pedidos');
                if (response.ok) {
                    todosPedidos = await response.json();
                    renderizarTabela(todosPedidos);
                }
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; color: red;">Erro ao carregar o histórico.</td></tr>';
            }
        }

        function renderizarTabela(pedidos) {
            tbody.innerHTML = ''; 

            if (pedidos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 20px;">Nenhum pedido encontrado.</td></tr>';
                return;
            }

            pedidos.forEach(pedido => {
                const tr = document.createElement('tr');
                const valorFormatado = pedido.valor_total ? pedido.valor_total.toFixed(2) : '0.00';
                
                let dataFormatada = pedido.data_pedido || '-';
                if (dataFormatada.includes('-')) {
                    const partes = dataFormatada.split('-');
                    if(partes.length === 3) dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
                }

                // Define as cores dos Status baseadas nas suas escolhas
                let corFundo = '#f39c12'; // Laranja padrão Aguardando
                if (pedido.status === 'Finalizado' || pedido.status === 'Entregue') { corFundo = '#27ae60'; } // Verde
                if (pedido.status === 'Em Produção') { corFundo = '#3498db'; } // Azul

                tr.innerHTML = `
                    <td style="white-space: nowrap;"><strong># ${pedido.num_pedido || pedido.id}</strong></td>
                    <td>${pedido.cliente_nome}</td>
                    <td style="color: #38bdf8; font-weight: bold;">${pedido.representante || '-'}</td>
                    <td>${dataFormatada}</td>
                    <td style="color: #27ae60; font-weight: bold;">R$ ${valorFormatado}</td>
                    <td><span style="background: ${corFundo}; color: white; padding: 3px 8px; border-radius: 10px; font-size: 12px;">${pedido.status}</span></td>
                    <td style="display: flex; gap: 5px;">
                        <a href="dashboard.html?id=${pedido.id}" style="background: #f1c40f; color: #333; padding: 5px 10px; text-decoration: none; border-radius: 5px; font-size: 12px; font-weight: bold; width: auto;">Editar</a>
                        <button onclick="excluirPedido(${pedido.id})" style="background: #e74c3c; color: white; padding: 5px 10px; border: none; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; margin: 0; width: auto;">Excluir</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Lógica de Filtragem Simultânea
        function filtrarPedidos() {
            const termoNome = inputNome.value.toLowerCase();
            const termoPedido = inputPedido.value.toLowerCase();
            const termoData = inputData.value;

            const filtrados = todosPedidos.filter(p => {
                const matchNome = p.cliente_nome && p.cliente_nome.toLowerCase().includes(termoNome);
                const matchPedido = (p.num_pedido && p.num_pedido.toLowerCase().includes(termoPedido)) || (p.id.toString().includes(termoPedido));
                const matchData = termoData === '' || p.data_pedido === termoData;

                return matchNome && matchPedido && matchData;
            });

            renderizarTabela(filtrados);
        }

        inputNome.addEventListener('input', filtrarPedidos);
        inputPedido.addEventListener('input', filtrarPedidos);
        inputData.addEventListener('change', filtrarPedidos);

        btnLimpar.addEventListener('click', () => {
            inputNome.value = '';
            inputPedido.value = '';
            inputData.value = '';
            renderizarTabela(todosPedidos);
        });

        async function excluirPedido(id) {
            if (confirm(`Tem certeza que deseja EXCLUIR o pedido #${id}?`)) {
                try {
                    const response = await fetch(`/api/pedidos/${id}`, { method: 'DELETE' });
                    const data = await response.json();
                    if (response.ok) {
                        carregarHistorico(); 
                    } else {
                        alert(`Erro: ${data.error}`);
                    }
                } catch (error) {
                    alert("Erro ao conectar com o servidor.");
                }
            }
        }

        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', () => {
                localStorage.removeItem('representanteLogado');
                window.location.href = '/index.html'; 
            });
        }

        document.addEventListener('DOMContentLoaded', carregarHistorico);
    </script>
</body>
</html>
